name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf ../../flatpakmgr-linux-x86_64.tar.gz flatpakmgr
          zip ../../flatpakmgr-linux-x86_64.zip flatpakmgr
          cd ../..
          sha256sum flatpakmgr-linux-x86_64.tar.gz flatpakmgr-linux-x86_64.zip > flatpakmgr-linux-x86_64.sha256

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} flatpakmgr-linux-x86_64.tar.gz flatpakmgr-linux-x86_64.zip flatpakmgr-linux-x86_64.sha256
