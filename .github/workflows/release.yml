name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar -czf ../../flatpakmgr-linux-x86_64.tar.gz flatpakmgr
          cd ../..
          sha256sum flatpakmgr-linux-x86_64.tar.gz > flatpakmgr-linux-x86_64.sha256

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          gh release upload "$TAG" flatpakmgr-linux-x86_64.tar.gz flatpakmgr-linux-x86_64.sha256 --clobber
